<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 50 }}">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1f680;</text></svg>">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 50 }}">
  <meta property="og:type" content="website">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        DevOps Roadmap <span class="logo-badge">2026</span>
      </a>
      <button class="mobile-toggle" aria-label="Toggle menu" aria-expanded="false">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <nav class="site-nav">
        <a href="{{ '/en/' | relative_url }}"{% if page.url contains '/en/' %} class="active"{% endif %}>English</a>
        <a href="{{ '/ua/' | relative_url }}"{% if page.url contains '/ua/' %} class="active"{% endif %}>Українська</a>
        <a href="{{ '/other/' | relative_url }}"{% if page.url contains '/other/' %} class="active"{% endif %}>Русский</a>
        <span class="nav-divider"></span>
        <a href="{{ '/mentoring-offer/mentoring-offer/DevOps-Mentoring-Offer' | relative_url }}">Mentoring</a>
        <a href="https://github.com/exitStatus0/DevOpsRoadmap2026" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="{{ '/en/' | relative_url }}">English</a>
        <a href="{{ '/ua/' | relative_url }}">Українська</a>
        <a href="{{ '/other/' | relative_url }}">Русский</a>
        <a href="{{ '/mentoring-offer/mentoring-offer/DevOps-Mentoring-Offer' | relative_url }}">1:1 Mentoring</a>
        <a href="https://github.com/exitStatus0/DevOpsRoadmap2026" target="_blank" rel="noopener">GitHub</a>
      </div>
      <p class="footer-copy">
        &copy; 2026 DevOps Roadmap. MIT License. I Remember. I Know. I Do.
      </p>
    </div>
  </footer>

  <button class="back-to-top" aria-label="Back to top">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 15l-6-6-6 6"/></svg>
  </button>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
